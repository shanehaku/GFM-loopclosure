<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GFM Whole Map Viewer</title>
  <link rel="stylesheet" href="./src/style.css?v=whole-v11" />
</head>
<body class="home">
  <main class="homeShell">
    <header class="homeHeader">
      <h1>GFM Whole Map Viewer</h1>
      <p>Whole-map-only GitHub Pages viewer split by map family to avoid loading unrelated PLY groups.</p>
    </header>

    <section class="homeSection">
      <h2>Whole Map</h2>
      <div class="sceneGrid">
        <a class="priority mapPriority" href="./maps/whole_map/?section=Original">
          <span class="cardTitle">Original</span>
          <span class="cardSublist"><span>original</span><span>no loop closure</span></span>
        </a>
        <a class="priority mapPriority" href="./maps/whole_map/?section=Optimized">
          <span class="cardTitle">Optimized</span>
          <span class="cardSublist"><span>Sim3 Graph</span><span>2node submap</span><span>structure deformation</span></span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
